name: Generate XMIT

on:
  push:
    tags:
      - "v*"
      
permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xmi-reader
       
    - name: Run processing script
      run: |
        mkdir -p $RUNNER_TEMP/ZIGI.INSTALL.PDS
        python .github/scripts/generate_xmit.py $RUNNER_TEMP/ZIGI.INSTALL.PDS

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: ZIGI.RELEASE
        files: ZIGI.INSTALL.XMI
        draft: true